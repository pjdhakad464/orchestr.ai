<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Official Profile Finder{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}?v={{ asset_version | default('1') }}" />
    <script defer src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script defer src="{{ url_for('static', path='/htmx-fallback.js') }}?v={{ asset_version | default('1') }}"></script>
  </head>
  <body>
    <style>
      .suite-navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #ffffff;
        border-bottom: 1px solid rgba(15, 23, 42, 0.08);
        padding: 12px 24px;
        position: sticky;
        top: 0;
        z-index: 9999;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
      }
      .suite-navbar-brand {
        font-weight: 700;
        font-size: 1.15rem;
        color: #0f172a;
        letter-spacing: -0.02em;
      }
      .suite-navbar-links {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .suite-navbar-link {
        color: #475569;
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 500;
        padding: 6px 12px;
        border-radius: 6px;
        transition: all 150ms ease;
      }
      .suite-navbar-link:hover {
        color: #0f172a;
        background: #f1f5f9;
      }
      .suite-navbar-link.active {
        color: #4f46e5;
        background: #e0e7ff;
      }
    </style>
    <nav class="suite-navbar">
      <div class="suite-navbar-brand">OrchestrAI</div>
      <div class="suite-navbar-links">
        <a href="/" class="suite-navbar-link active">Data Ops Validator</a>
        <a href="/calendar/" class="suite-navbar-link">Asana LF Automation Tasks</a>
        <a href="/imdb/" class="suite-navbar-link">IMDb Lookup</a>
      </div>
    </nav>
    <div class="page-shell">
      <header class="welcome-header panel">
        <h1>Welcome to OrchestrAI</h1>
        <p class="subtitle">A system that intelligently coordinates workflows, metadata, automation, and operations.</p>
      </header>
      <main>{% block content %}{% endblock %}</main>
    </div>
  </body>
</html>
