{% extends "base.html" %}

{% block title %}Data Ops Validator — OrchestrAI{% endblock %}

{% block content %}
<div class="validator-single-container" style="max-width: 1080px; margin: 0 auto;">

  <div class="mode-tabs" role="tablist" aria-label="Data Ops mode" style="display: flex; gap: 4px; border-bottom: 1px solid rgba(15,23,42,0.08); margin-bottom: 20px;">
    <button type="button" class="mode-tab active" id="tab-validate" role="tab" aria-selected="true" onclick="setDataOpsMode('validate')">
      <span class="material-symbols-outlined" style="font-size: 16px; vertical-align: -3px;">shield</span>
      Validate Workbook
    </button>
    <button type="button" class="mode-tab" id="tab-bdr" role="tab" aria-selected="false" onclick="setDataOpsMode('bdr')">
      <span class="material-symbols-outlined" style="font-size: 16px; vertical-align: -3px;">construction</span>
      BDR Ingest Builder
    </button>
    <button type="button" class="mode-tab" id="tab-apply" role="tab" aria-selected="false" onclick="setDataOpsMode('apply')">
      <span class="material-symbols-outlined" style="font-size: 16px; vertical-align: -3px;">difference</span>
      Apply Report QA
    </button>
  </div>

  <div id="mode-validate">
    {% include "_validator_panel.html" %}
  </div>
  <div id="mode-bdr" style="display: none;">
    {% include "_bdr_ingest_panel.html" %}
  </div>
  <div id="mode-apply" style="display: none;">
    {% include "_apply_report_panel.html" %}
  </div>
</div>

<div class="results-workspaces-container" style="max-width: 1080px; margin: 24px auto 0 auto; display: flex; flex-direction: column; gap: 24px;">
  <section id="validation-workspace" class="workspace"></section>
</div>

<style>
  .mode-tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border-soft);
    margin-bottom: 20px;
  }
  .mode-tab {
    appearance: none;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    padding: 12px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .mode-tab:hover { color: var(--text-main); }
  .mode-tab.active { color: var(--brand-primary); border-bottom-color: var(--brand-primary); }
  .mode-tab:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--brand-glow); border-radius: 6px; }
</style>

<script>
  function setDataOpsMode(mode) {
    var modes = ['validate', 'bdr', 'apply'];
    modes.forEach(function (m) {
      var panel = document.getElementById('mode-' + m);
      var tab = document.getElementById('tab-' + m);
      var on = m === mode;
      if (panel) panel.style.display = on ? 'block' : 'none';
      if (tab) {
        tab.classList.toggle('active', on);
        tab.setAttribute('aria-selected', on ? 'true' : 'false');
      }
    });
  }
</script>
{% endblock %}
