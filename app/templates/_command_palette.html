<!-- Command palette (⌘K). Commands injected server-side from the registry. -->
<div class="cmdk" id="cmdk" hidden aria-hidden="true">
  <div class="cmdk-backdrop" data-cmdk-close></div>
  <div class="cmdk-panel" role="dialog" aria-modal="true" aria-label="Command palette">
    <div class="cmdk-input-row">
      <span class="material-symbols-outlined" aria-hidden="true">search</span>
      <input id="cmdk-input" type="text" autocomplete="off" spellcheck="false"
             placeholder="Search or ask OrchestrAI…" aria-label="Search or ask OrchestrAI" />
      <kbd class="cmdk-esc">esc</kbd>
    </div>
    <div class="cmdk-results" id="cmdk-results" role="listbox" aria-label="Commands"></div>
    <div class="cmdk-foot">
      <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
      <span><kbd>↵</kbd> open</span>
      <span class="cmdk-foot-note">Assistant actions route today · LLM-ready</span>
    </div>
  </div>
</div>
<script id="cmdk-data" type="application/json">{{ command_palette | tojson }}</script>
