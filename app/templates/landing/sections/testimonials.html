<section class="lp-section" id="testimonials">
  <div class="lp-wrap">
    <div class="lp-section-head lp-reveal">
      <span class="lp-eyebrow">{{ landing.testimonials.eyebrow }}</span>
      <h2 class="lp-h2">{{ landing.testimonials.title }}</h2>
    </div>
    <div class="lp-grid lp-grid-3">
      {% for t in landing.testimonials.entries %}
      <div class="lp-card lp-quote lp-reveal">
        <p>“{{ t.quote }}”</p>
        <footer><b>{{ t.name }}</b>{{ t.role }}</footer>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
