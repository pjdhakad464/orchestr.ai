<section class="lp-section" id="benefits">
  <div class="lp-wrap">
    <div class="lp-section-head lp-reveal">
      <span class="lp-eyebrow">{{ landing.benefits.eyebrow }}</span>
      <h2 class="lp-h2">{{ landing.benefits.title }}</h2>
    </div>
    <div class="lp-grid lp-grid-4">
      {% for b in landing.benefits.entries %}
      <div class="lp-card lp-reveal">
        <div class="lp-card-icon"><span class="material-symbols-outlined">{{ b.icon }}</span></div>
        <h3>{{ b.title }}</h3>
        <p>{{ b.desc }}</p>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
