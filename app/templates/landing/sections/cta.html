<section class="lp-section lp-cta">
  <div class="lp-wrap">
    <div class="lp-cta-panel lp-reveal">
      <h2 class="lp-h2" style="margin-top:0">{{ landing.cta.title }}</h2>
      <p class="lp-lead" style="margin:0 auto 28px">{{ landing.cta.lead }}</p>
      <div class="lp-hero-cta">
        <a href="{{ landing.cta.cta_primary.href }}" class="lp-btn lp-btn-primary">{{ landing.cta.cta_primary.label }}</a>
        <a href="{{ landing.cta.cta_secondary.href }}" class="lp-btn lp-btn-ghost">{{ landing.cta.cta_secondary.label }}</a>
      </div>
    </div>
  </div>
</section>
