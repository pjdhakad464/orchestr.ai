worker_processes 1;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Write temp files to writeable paths
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path       /tmp/nginx_proxy;
    fastcgi_temp_path     /tmp/nginx_fastcgi;
    uwsgi_temp_path       /tmp/nginx_uwsgi;
    scgi_temp_path        /tmp/nginx_scgi;

    access_log /tmp/nginx_access.log;
    error_log /tmp/nginx_error.log;

    # Upstreams
    upstream validator_backend    { server 127.0.0.1:8000; }
    upstream title_lookup_backend { server 127.0.0.1:8001; }
    upstream calendar_backend     { server 127.0.0.1:8002; }
    upstream imdb_backend         { server 127.0.0.1:8003; }

    server {
        listen 7860;
        server_name localhost;

        client_max_body_size 50M;

        proxy_connect_timeout 60s;
        proxy_read_timeout    300s;
        proxy_send_timeout    120s;

        # Main App (Validator Engine) — default route
        location / {
            proxy_pass http://validator_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Title URL Lookup
        location /title-lookup/ {
            proxy_pass http://title_lookup_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Release Calendar
        location /calendar/ {
            proxy_pass http://calendar_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # IMDb Lookup
        location /imdb/ {
            proxy_pass http://imdb_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health Check
        location = /health {
            access_log off;
            return 200 '{"status":"ok","services":4}';
            add_header Content-Type application/json;
        }

        # Static file caching
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            proxy_pass http://validator_backend;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}
