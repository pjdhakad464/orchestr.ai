# ─── OrchestrAI — Nginx Reverse Proxy Configuration ────────────────────────
#
# Installation:
#   sudo cp deploy/nginx/orchestrai.conf /etc/nginx/sites-available/orchestrai
#   sudo ln -s /etc/nginx/sites-available/orchestrai /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# For HTTPS, run:
#   sudo certbot --nginx -d orchestrai.example.com
# ───────────────────────────────────────────────────────────────────────────

# ── Upstream Definitions ──────────────────────────────────────────────────
upstream orchestrai_validator    { server 127.0.0.1:8000; }
upstream orchestrai_title_lookup { server 127.0.0.1:8001; }
upstream orchestrai_calendar     { server 127.0.0.1:8002; }
upstream orchestrai_imdb         { server 127.0.0.1:8003; }
upstream orchestrai_ig_filter    { server 127.0.0.1:8004; }
upstream orchestrai_ig_analyzer  { server 127.0.0.1:8010; }

# ── Server Block ──────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;

    # Using raw IP — accepts requests on any hostname/IP.
    # When you get a domain, replace _ with your domain name
    # and run: sudo certbot --nginx -d yourdomain.com
    server_name _;

    # Allow large file uploads (Excel workbooks)
    client_max_body_size 50M;

    # ── Timeouts for long-running scrapers ──
    proxy_connect_timeout 60s;
    proxy_read_timeout    300s;
    proxy_send_timeout    120s;

    # ── Main App (Validator Engine) — default route ──
    location / {
        proxy_pass http://orchestrai_validator;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Title URL Lookup ──
    location /title-lookup/ {
        proxy_pass http://orchestrai_title_lookup/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Release Calendar (Metacritic + Box Office Mojo) ──
    location /calendar/ {
        proxy_pass http://orchestrai_calendar/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── IMDb Lookup ──
    location /imdb/ {
        proxy_pass http://orchestrai_imdb/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Instagram Comment News Filter ──
    location /ig-filter/ {
        proxy_pass http://orchestrai_ig_filter/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Instagram Comment Analyzer ──
    location /ig-analyzer/ {
        proxy_pass http://orchestrai_ig_analyzer/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health Check (Nginx-level, no upstream) ──
    location = /health {
        access_log off;
        return 200 '{"status":"ok","services":6}';
        add_header Content-Type application/json;
    }

    # ── Static file caching ──
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://orchestrai_validator;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
